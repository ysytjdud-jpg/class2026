<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>숲속 유령 찾기</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        cursor: none;
        background: black;
        font-family: sans-serif;
    }

    /* 상단 안내 */
    #title {
        position: fixed;
        top: 20px;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 28px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(0,0,0,0.7);
        z-index: 10;
    }

    /* 엔딩 텍스트 */
    #ending {
        position: fixed;
        top: 50%;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 38px;
        font-weight: bold;
        transform: translateY(-50%);
        opacity: 0;
        transition: opacity 0.8s;
        z-index: 20;
    }

    /* 숲 */
    #forest {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url('https://picsum.photos/1920/1080?blur=2') no-repeat center/cover;
        filter: brightness(0.35) contrast(1.1);
    }

    /* 손전등 */
    #light {
        position: absolute;
        width: 240px;
        height: 240px;
        border-radius: 50%;
        pointer-events: none;

        background: radial-gradient(
            circle,
            rgba(255,255,255,0.5) 0%,
            rgba(255,255,255,0.25) 30%,
            rgba(255,255,255,0.1) 55%,
            rgba(255,255,255,0.0) 85%
        );

        mix-blend-mode: screen;
    }

    /* 유령 */
    .ghost {
        position: absolute;
        font-size: 60px;
        opacity: 0;
        transition: opacity 0.3s;
        cursor: pointer;
        user-select: none;
    }

    .found {
        opacity: 1 !important;
    }

</style>
</head>

<body>

<div id="title">숲에서 유령 5명을 찾아보세요! 👻</div>
<div id="ending"></div>

<div id="forest"></div>
<div id="light"></div>

<!-- 유령 5개 -->
<div class="ghost">👻</div>
<div class="ghost">👻</div>
<div class="ghost">👻</div>
<div class="ghost">👻</div>
<div class="ghost">👻</div>

<audio id="sound" src="https://www.soundjay.com/human/sounds/laugh-1.mp3"></audio>

<script>

const light = document.getElementById("light");
const ghosts = document.querySelectorAll(".ghost");
const sound = document.getElementById("sound");
const ending = document.getElementById("ending");

let foundCount = 0;

/* 유령 배치 */
function placeGhosts() {
    ghosts.forEach(g => {
        const x = Math.random() * (window.innerWidth - 80);
        const y = Math.random() * (window.innerHeight - 80);

        g.style.left = x + "px";
        g.style.top = y + "px";
        g.style.display = "block";
        g.classList.remove("found");
    });

    foundCount = 0;
}

/* 시작 */
placeGhosts();

/* 손전등 */
document.addEventListener("mousemove", (e) => {
    light.style.left = (e.clientX - 120) + "px";
    light.style.top = (e.clientY - 120) + "px";

    checkGhosts(e.clientX, e.clientY);
});

/* 유령 보이기 */
function checkGhosts(mx, my) {
    ghosts.forEach(g => {
        const rect = g.getBoundingClientRect();
        const gx = rect.left + rect.width / 2;
        const gy = rect.top + rect.height / 2;

        const dist = Math.sqrt((mx - gx) ** 2 + (my - gy) ** 2);

        if (dist < 130) {
            g.classList.add("found");
        } else {
            g.classList.remove("found");
        }
    });
}

/* 클릭 */
ghosts.forEach(g => {
    g.addEventListener("click", () => {
        if (g.style.display === "none") return;

        sound.currentTime = 0;
        sound.play();

        g.style.display = "none";
        foundCount++;

        if (foundCount === ghosts.length) {
            showEndingSequence();
        }
    });
});

/* 엔딩 시퀀스 */
function showEndingSequence() {

    const messages = [
        "유령의 존재를 아시나요?",
        "어디에나 어디서든 있답니다.",
        "다시 시작하겠습니다."
    ];

    let i = 0;
    ending.style.opacity = 1;

    function nextMessage() {
        if (i < messages.length) {
            ending.textContent = messages[i];
            i++;
            setTimeout(nextMessage, 1500);
        } else {
            ending.style.opacity = 0;
            setTimeout(() => {
                placeGhosts();
            }, 800);
        }
    }

    nextMessage();
}

</script>

</body>
</html>
